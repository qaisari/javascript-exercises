<!DOCTYPE html>

<body>
    <script>
        function add7(num) {
            return num + 7
        }
        function multiply(x, y) {
            return x * y
        }
        function capitalize(string) {
            if (typeof string === "string") {
                if (string.length > 0) {
                    let lowString = string.toLowerCase()
                    let result = lowString[0].toUpperCase() + lowString.slice(1)
                    return result
                } else {
                    throw new TypeError("String must be not umpty")
                } 
            } else {
                throw new TypeError("Input must be a string")
            }
        }
        function lastLetter(string) {
            return string.slice(-1)
        }
    </script>
</body>
